name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  RUSTUP_TOOLCHAIN: stable

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../arbor-${{ matrix.target }}.tar.gz arbor
      - uses: actions/upload-artifact@v4
        with:
          name: arbor-${{ matrix.target }}
          path: arbor-${{ matrix.target }}.tar.gz

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create ${{ github.ref_name }} arbor-*.tar.gz --generate-notes

  homebrew:
    name: Update Homebrew tap
    needs: release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: morellodev/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      - name: Update formula
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          DARWIN_ARM64_URL="https://github.com/morellodev/arbor/releases/download/v${VERSION}/arbor-aarch64-apple-darwin.tar.gz"
          DARWIN_X86_URL="https://github.com/morellodev/arbor/releases/download/v${VERSION}/arbor-x86_64-apple-darwin.tar.gz"
          LINUX_X86_URL="https://github.com/morellodev/arbor/releases/download/v${VERSION}/arbor-x86_64-unknown-linux-gnu.tar.gz"
          LINUX_ARM64_URL="https://github.com/morellodev/arbor/releases/download/v${VERSION}/arbor-aarch64-unknown-linux-gnu.tar.gz"

          DARWIN_ARM64_SHA=$(curl -sL "$DARWIN_ARM64_URL" | shasum -a 256 | cut -d' ' -f1)
          DARWIN_X86_SHA=$(curl -sL "$DARWIN_X86_URL" | shasum -a 256 | cut -d' ' -f1)
          LINUX_X86_SHA=$(curl -sL "$LINUX_X86_URL" | shasum -a 256 | cut -d' ' -f1)
          LINUX_ARM64_SHA=$(curl -sL "$LINUX_ARM64_URL" | shasum -a 256 | cut -d' ' -f1)

          mkdir -p Formula
          cat > Formula/arbor.rb << FORMULA
          class Arbor < Formula
            desc "A CLI for managing git worktrees"
            homepage "https://github.com/morellodev/arbor"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${DARWIN_ARM64_URL}"
                sha256 "${DARWIN_ARM64_SHA}"
              else
                url "${DARWIN_X86_URL}"
                sha256 "${DARWIN_X86_SHA}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${LINUX_ARM64_URL}"
                sha256 "${LINUX_ARM64_SHA}"
              else
                url "${LINUX_X86_URL}"
                sha256 "${LINUX_X86_SHA}"
              end
            end

            def install
              bin.install "arbor"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/arbor --version")
            end
          end
          FORMULA

          # Remove leading whitespace from heredoc
          sed -i '' 's/^          //' Formula/arbor.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/arbor.rb
          git commit -m "Update arbor to ${GITHUB_REF_NAME#v}"
          git push
